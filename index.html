<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Shenyang Street Mint</title>
</head>
<body>
  <h1>This a https</h1>
  <h2>Are you now?</h2>

  <!-- 随机文字显示区域 -->
  <p id="randomText"></p>

  <p>no more</p>
  <p> On https://likline.github.io</p>

  <script>
    // 这里放你想随机显示的文字
    let words = [
      "Hello World",
      "Everything is ok",
      "Stay safe",
      "Good luck",
      "Have a nice day",
      "Keep smiling"
    ];

    let tag = document.getElementById('randomText');

    function change() {
      let r = Math.floor(Math.random() * words.length);
      tag.innerText = words[r];
    }

    // 立即显示一句
    change();
    // 每15秒换一次
    setInterval(change, 15000);
  </script>
</body>
</html>
