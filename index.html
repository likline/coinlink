<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Shenyang Street Mint</title>
</head>
<body>
  <h1>This a https</h1>
  <h2>Are you now?</h2>

  <!-- 随机文字显示区域 -->
  <p id="randomText"></p>
  <h2>Download our latest version of the game！</h2>
  <p>the 《Word-36Hz0.0.0》:</p>
  <h2>Our contact information:</h2>
  <p>Letter box:bibiberber@qq.com</p>
  <p>no more</p>
  <p> On https://likline.github.io</p>
  

  <script>
    // 这里放你想随机显示的文字
    let words = [
      "the https begin on 2026.4.15",
      "tips:don't eat photoes",
      "is time to cake at stake!",
      "made in tianjin China",
      "is time to do the homework!",
      "teto is a Hypothetical song girl"
    ];

    let tag = document.getElementById('randomText');

    function change() {
      let r = Math.floor(Math.random() * words.length);
      tag.innerText = words[r];
    }

    // 立即显示一句
    change();
    // 每15秒换一次
    setInterval(change, 10000);
  </script>
</body>
</html>
